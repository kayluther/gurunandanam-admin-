<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin | Gurunandanam Stores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <header class="admin-header">
        <div class="admin-header-content">
            <h1>⚙️ Store Admin Panel</h1>
            <!-- Link to your public store -->
            <a href="https://kayluther.github.io/gurunandanam-stores/" target="_blank" class="btn-view-store">View Live Store</a>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-grid">
            <!-- Add / Edit Item Form -->
            <div class="admin-card">
                <h2 id="formTitle">Add New Item</h2>
                <form id="addItemForm">
                    <div class="input-group">
                        <label for="itemName">Product Name</label>
                        <input type="text" id="itemName" placeholder="e.g., Premium Matta Rice (5kg)" required>
                    </div>
                    <div class="input-group">
                        <label for="itemPrice">Price (₹)</label>
                        <input type="number" id="itemPrice" placeholder="e.g., 250" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary">Add to Inventory</button>
                    <!-- Cancel Edit Button (Hidden by default) -->
                    <button type="button" id="cancelEditBtn" class="btn-secondary" style="display: none; margin-top: 10px;">Cancel Edit</button>
                </form>
            </div>

            <!-- Inventory List -->
            <div class="admin-card">
                <h2>Current Inventory</h2>
                
                <!-- Search Bar -->
                <div class="admin-search-container">
                    <input type="text" id="adminSearchInput" placeholder="🔍 Search inventory to edit or remove..." class="admin-search-input">
                </div>

                <div class="inventory-header">
                    <span>Product</span>
                    <span>Actions</span>
                </div>
                <ul id="admin-product-list" class="admin-list">
                    <li class="loading">Loading inventory...</li>
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="admin-year"></span> Gurunandanam Stores Admin Portal.</p>
        </div>
    </footer>

    <script type="module" src="admin.js"></script>
    <script>document.getElementById('admin-year').textContent = new Date().getFullYear();</script>
</body>
</html>
